        - button "003 周纪 · 第 3/5 卷 資治通鑑卷第三 本卷起自公元前320年，至公元前298年，共23年。开篇记述“衞更貶號曰君”，随后写到“秦伐韓，取鄢”、“魏惠王薨，子襄王立。孟子入見而出，語人曰：「望之不似人君，就之而不見所畏焉。卒然問曰：『天下惡乎定？』吾對曰：『定于一。』『孰能一之？』對曰：『……”…… 元年（辛丑、前三二○） 1衞更貶號曰君。顯王二十三年，衞已貶號曰侯；介於秦、魏之間，國日以削弱，因更貶其號曰君。更，居孟翻。貶，悲檢翻。 二年（壬寅、前三一九） 1秦伐韓，取鄢。春秋「晉敗楚師于鄢陵」，卽此鄢也。班志作「傿陵」，屬潁川郡。鄢，音謁晚翻，又於建翻；師古音偃。史記正義曰：許州鄢陵縣西北十五里有鄢陵古城。 周纪 正文75段 胡注2段 小注430处" [ref=e221] [cursor=pointer]:
