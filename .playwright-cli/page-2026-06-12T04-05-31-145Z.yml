              - generic [ref=e187]: （戊寅、前四○三）上距春秋獲麟七十八年，距左傳趙襄子惎智伯事七十一年。惎，毒也，音其冀翻。
            - paragraph [ref=e188]:
              - text: 1初命晉大夫魏斯、趙籍、韓虔爲諸侯。
              - generic [ref=e189]: 此溫公書法所由始也。魏之先，畢公高後，與周同姓；其苗裔曰畢萬，始封於魏。至魏舒，始爲晉正卿；三世至斯。趙之先，造父後；至叔帶，始自周適晉；至趙夙，始封於耿。至趙盾，始爲晉正卿；六世至籍。韓之先，出於周武王；至韓武子事晉，封於韓原。至韓厥，爲晉正卿；六世至虔。三家者，世爲晉大夫，於周則陪臣也。周室旣衰，晉主夏盟，以尊王室，故命之爲伯。三卿竊晉之權，暴蔑其君，剖分其國，此王法所必誅也。威烈王不惟不能誅之，又命之爲諸侯，是崇獎奸名犯分之臣也，通鑑始於此，其所以謹名分歟！
            - paragraph [ref=e190]: 臣光曰：臣聞天子之職莫大於禮，禮莫大於分，分莫大於名。分，扶問翻；下同。何謂禮？紀綱是也。何謂分？君、臣是也。何謂名？公、侯、卿、大夫是也。
            - paragraph [ref=e191]:
              - text: 夫以四海之廣，夫以，音扶。兆民之衆，受制於一人，雖有絕倫之力，高世之智，莫
              - generic [ref=e192]: 『章：十二行本「莫」下有「敢」字；乙十一行本同；孔本同。』
              - text: 不奔走而服役者，豈非以禮爲之紀綱
              - generic [ref=e193]: 『章：十二行本，二字互乙；乙十一行本同；孔本同。』
              - text: 哉！是故天子統三公，統，他綜翻。三公率諸侯，諸侯制卿大夫，卿大夫治士庶人。治，直之翻。貴以臨賤，賤以承貴。上之使下猶心腹之運手足，根本之制支葉，下之事上猶手足之衞心腹，支葉之庇本根，然後能上下相保而國家治安。治，直吏翻。故曰天子之職莫大於禮也。
