        - button "002 周纪 · 第 2/5 卷 資治通鑑卷第二 本卷起自公元前368年，至公元前321年，共48年。开篇记述“齊伐魏，取觀津”，随后写到“趙侵齊，取長城”、“魏、韓會於宅陽”、“秦敗魏師、韓師於洛陽”等事。这些事件共同显示：周室名分继续存在，但实际权力已向诸侯与卿大夫下移，战国秩序由此展开。 元年（癸丑、前三六八） 1齊伐魏，取觀津。康曰：齊伐魏，魏惠王請獻觀以和，卽觀津。余按班志信都國有觀津縣，與齊相去甚遠，且趙地也。又東郡有畔觀縣。水經：大河故瀆東逕五鹿之野，又東逕衞國故城南，古斟觀也。此其魏之觀津歟！徐廣曰：觀，今衞縣。史記正義曰：魏州觀城縣，古觀國。國語云：觀國，夏太康第五弟之所封也。觀，工喚翻。 2趙侵齊，取長城。劉昭志：濟北盧縣有長城。史記蘇代說燕王曰：「齊有長城鉅防，」卽此。 三年（乙卯、前三六六） 周纪 正文107段 胡注4段 小注420处" [ref=e199] [cursor=pointer]:
