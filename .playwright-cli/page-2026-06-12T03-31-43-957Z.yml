          - button "079 晋纪 西晋统一与内乱 卷第七十九·晋纪一·世祖武皇帝上之上~泰始8年 本卷覆盖265-272年，处在晋纪所写的历史脉络中，晋朝从统一走向门阀政治、宗王内争与南北分裂，政权合法性不断被军政力量改写。要事包括：封皇帝的叔祖司马孚为安平王；叔父司马斡为平原王，司马亮为扶风王，司马为东莞王，司马骏为汝阴王，司马肜为梁王，司马伦…；吴主询问群臣，镇西大将军陆凯说；北方新近吞并了巴、蜀，派使者来求和，这并不是向我们求援，只不过是想积蓄力量以等待时机；杨稷派将军毛炅、董元攻打合浦，在古城交战，大破吴兵，杀死刘俊、则，剩下的散兵逃回了合浦。可重点看军事攻防、权力更替、外交边疆如何改变局势。 265-272 · 摘读 5 段 · 有全文" [ref=e986] [cursor=pointer]:
