          - paragraph [ref=e3091]: 文王序《易》，以乾、坤爲首。孔子系之曰：“天尊地卑，乾坤定矣。卑高以陳，貴賤位矣。”言君臣之位猶天地之不可易也。《春秋》抑諸侯，尊王室，王人雖微，序於諸侯之上，以是見聖人於君臣之際未嘗不也。非有桀、紂之暴，湯、武之仁，人歸之，天命之，君臣之分當守節伏死而已矣。是故以微子而代紂則成湯配天矣，以季札而君吳則太伯血食矣，然二子寧亡國而不爲者，誠以禮之大節不可亂也。故曰禮莫大於分也。
        - article [ref=e3092]:
          - heading "承勢" [level=3] [ref=e3093]
          - paragraph [ref=e3094]: 趙簡子之子，長曰伯魯，幼曰無恤。將置後，不知所立，乃書訓戒之辭於二簡，以授二子曰：“謹識之！”三年而問之，伯魯不能舉其辭；求其簡，已失之矣。問無恤，誦其辭甚習；求其簡，出諸袖中而奏之。於是簡子以無恤爲賢，立以爲後。
        - article [ref=e3095]:
          - heading "轉折" [level=3] [ref=e3096]
          - paragraph [ref=e3097]: 襄子爲伯魯之不立也，有子五人，不肯置後。封伯魯之子於代，曰代成君，早卒；立其子浣爲趙氏後。襄子卒，弟桓子逐浣而自立；一年卒。趙氏之人曰：“桓子立非襄主意。”乃共殺其子，復迎浣而立之，是爲獻子。獻子生籍，是爲烈侯。魏斯者，魏桓子之孫也，是爲文侯。韓康子生武子；武子生虔，是爲景侯。
        - article [ref=e3098]:
          - heading "深讀" [level=3] [ref=e3099]
          - paragraph [ref=e3100]: 三月，盜殺韓相俠累。俠累與濮陽嚴仲子有惡。仲子聞軹人聶政之勇，以黃金百溢爲政母壽，欲因以報仇。政不受，曰：“老母在，政身未敢以許人也！”及母卒，仲子乃使政刺俠累。俠累方坐府上，兵衛甚衆，聶政直入上階，刺殺俠累，因自皮面決眼，自屠出腸。韓人暴其屍於市，購問，莫能識。其姊聞而往，哭之曰：“是軹深井裏聶政也！以妾尚在之故，重自刑以絕從。妾柰何畏歿身之誅，終滅賢弟之名！”遂死於政屍之旁。
        - article [ref=e3101]:
          - heading "收束" [level=3] [ref=e3102]
          - paragraph [ref=e3103]: 子思言於衛侯曰：“君之國事將日非矣！”公曰：“何故？”對曰：“有由然焉。君出言自以爲是，而卿大夫莫敢矯其非；卿大夫出言亦自以爲是，而士庶人莫敢矯其非。君臣既自賢矣，而羣下同聲賢之，賢之則順而有福，矯之則逆而有禍，如此則善安從生！《詩》曰：‘具曰予聖，誰知烏之雌雄？’抑亦似君之君臣乎！”